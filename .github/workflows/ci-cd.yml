name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Build and test — always runs
  # ──────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and run tests
        run: mvn clean verify

  # ──────────────────────────────────────────────
  # JOB 2: Build and push Docker images
  # Runs on push to main or develop only
  # develop → :develop tag
  # main    → :latest and :prod tags
  # ──────────────────────────────────────────────
  docker-build-push:
    name: Docker – ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: api-gateway
          - service: product-service
          - service: order-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.service }}
          tags: |
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=prod,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=${{ github.ref == 'refs/heads/main' && 'prod-' || 'dev-' }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  # ──────────────────────────────────────────────
  # JOB 3: Deploy to Development
  # Triggered automatically on push to develop
  # No approval required
  # ──────────────────────────────────────────────
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/develop'

    environment:
      name: development
      url: http://localhost:7080

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Deploy to Development
        run: |
          echo "============================================"
          echo "  Deploying to DEVELOPMENT environment"
          echo "============================================"
          echo ""
          echo "  Branch : develop"
          echo "  Images : ghcr.io/${{ env.IMAGE_OWNER }}/<service>:develop"
          echo "  Commit : ${{ github.sha }}"
          echo ""
          echo "  docker compose -f docker-compose.dev.yml pull"
          echo "  docker compose -f docker-compose.dev.yml up -d --force-recreate"
          echo ""
          echo "  Services available at:"
          echo "    API Gateway     -> http://localhost:7080"
          echo "    Product Service -> http://localhost:7081"
          echo "    Order Service   -> http://localhost:7082"
          echo ""
          echo "  Dev deployment complete!"

  # ──────────────────────────────────────────────
  # JOB 4: Deploy to Production
  # Triggered on push to main
  # Requires manual approval via GitHub Environment
  # ──────────────────────────────────────────────
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main'

    environment:
      name: production
      url: http://localhost:7080

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Deploy to Production
        run: |
          echo "============================================"
          echo "  Deploying to PRODUCTION environment"
          echo "============================================"
          echo ""
          echo "  Branch : main"
          echo "  Images : ghcr.io/${{ env.IMAGE_OWNER }}/<service>:latest"
          echo "  Commit : ${{ github.sha }}"
          echo ""
          echo "  docker compose -f docker-compose.prod.yml pull"
          echo "  docker compose -f docker-compose.prod.yml up -d --force-recreate"
          echo ""
          echo "  Services available at:"
          echo "    API Gateway     -> http://localhost:7080"
          echo "    Product Service -> http://localhost:7081"
          echo "    Order Service   -> http://localhost:7082"
          echo ""
          echo "  Production deployment complete!"
