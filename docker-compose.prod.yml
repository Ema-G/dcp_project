services:
  product-service:
    image: ghcr.io/${IMAGE_OWNER}/product-service:latest
    container_name: product-service-prod
    ports:
      - "7081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_JPA_SHOW_SQL=false
    restart: always
    networks:
      - ecommerce-prod

  order-service:
    image: ghcr.io/${IMAGE_OWNER}/order-service:latest
    container_name: order-service-prod
    ports:
      - "7082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_JPA_SHOW_SQL=false
    restart: always
    networks:
      - ecommerce-prod

  api-gateway:
    image: ghcr.io/${IMAGE_OWNER}/api-gateway:latest
    container_name: api-gateway-prod
    ports:
      - "7080:8080"
    depends_on:
      - product-service
      - order-service
    environment:
      - PRODUCT_SERVICE_URI=http://product-service:8081
      - ORDER_SERVICE_URI=http://order-service:8082
    restart: always
    networks:
      - ecommerce-prod

networks:
  ecommerce-prod:
    driver: bridge
